name: Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  gjs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install GNOME test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gjs \
            gir1.2-adw-1 \
            gir1.2-secret-1 \
            gir1.2-soup-3.0 \
            gnome-shell \
            libglib2.0-bin

      - name: Run checks
        run: make check
